# ─── Tmux config optimizado para Termux (pantalla táctil) ───

# Usar Ctrl+A como prefijo en vez de Ctrl+B (más fácil en teclado táctil)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Historial grande
set -g history-limit 50000

# Indexación en 1 (no 0)
set -g base-index 1
setw -g pane-base-index 1

# Ratón activado (para deslizar entre paneles)
set -g mouse on

# Colores fáciles de ver en pantalla pequeña
set -g default-terminal "screen-256color"
set -g status-style bg=black,fg=white
set -g status-left-style bg=blue,fg=white
set -g status-right-style bg=black,fg=cyan

# Barra de estado simple
set -g status-left "#[fg=white,bg=blue] #S "
set -g status-right "#[fg=cyan]%H:%M "
set -g status-justify centre
set -g status-interval 1

# Notificación de actividad en ventanas
setw -g monitor-activity on
set -g visual-activity off

# ─── Atajos rápidos para pantalla táctil ───

# Split horizontal (Ctrl+A luego |)
bind | split-window -h
# Split vertical (Ctrl+A luego -)
bind - split-window -v

# Navegar paneles con Alt + flechas (más fácil que Ctrl+B flecha)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Redimensionar paneles con Ctrl + flechas
bind -n C-Left resize-pane -L 2
bind -n C-Right resize-pane -R 2
bind -n C-Up resize-pane -U 2
bind -n C-Down resize-pane -D 2

# Cerrar panel con Ctrl+A luego x (confirmar con y)
bind x confirm-before -p "kill-pane? (y/n) " kill-pane

# Recargar config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ─── Sesión por defecto ───
set -g set-titles on
set -g set-titles-string "#(whoami)@#H - #S"
